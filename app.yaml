name: sportbot
region: nyc

ingress:
  rules:
  - match:
      path:
        prefix: /api
    component:
      name: backend
      preserve_path_prefix: true
  - match:
      path:
        prefix: /admin
    component:
      name: backend
      preserve_path_prefix: true
  - match:
      path:
        prefix: /django-static
    component:
      name: backend
      preserve_path_prefix: true
  - match:
      path:
        prefix: /
    component:
      name: frontend

services:
- name: backend
  dockerfile_path: Dockerfile
  source_dir: /
  github:
    branch: main
    deploy_on_push: true
    repo: bahadurkhan111/bot-backend
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs

  envs:
  - key: DJANGO_SETTINGS_MODULE
    scope: RUN_AND_BUILD_TIME
    value: config.settings
  - key: DEBUG
    scope: RUN_AND_BUILD_TIME
    value: "False"
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: ${SECRET_KEY}
  - key: ALLOWED_HOSTS
    scope: RUN_AND_BUILD_TIME
    value: "*"
  - key: CORS_ALLOWED_ORIGINS
    scope: RUN_AND_BUILD_TIME
    value: https://${APP_DOMAIN}
  - key: SECURE_SSL_REDIRECT
    scope: RUN_AND_BUILD_TIME
    value: "False"
  - key: GROQ_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: ${GROQ_API_KEY}
  - key: GEMINI_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: ${GEMINI_API_KEY}

  health_check:
    http_path: /api/health/
    initial_delay_seconds: 60
    period_seconds: 30
    timeout_seconds: 10
    success_threshold: 1
    failure_threshold: 5

- name: frontend
  build_command: npm ci && npm run build
  run_command: npx serve -s build -l 3000
  source_dir: /
  environment_slug: node-js
  github:
    branch: main
    deploy_on_push: true
    repo: bahadurkhan111/bot-frontend
  http_port: 3000
  instance_count: 1
  instance_size_slug: basic-xxs

  envs:
  - key: REACT_APP_API_URL
    scope: BUILD_TIME
    value: ${APP_URL}
  - key: PORT
    scope: RUN_TIME
    value: "3000"

  health_check:
    http_path: /
    initial_delay_seconds: 30
    period_seconds: 30
    timeout_seconds: 5
    success_threshold: 1
    failure_threshold: 3
